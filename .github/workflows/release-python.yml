name: release-python

# Mono-version: a single vX.Y.Z tag drives the Python wheel publish.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC) — no token to manage
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Build wheel + sdist
        working-directory: python
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.4
        with:
          packages-dir: python/dist
